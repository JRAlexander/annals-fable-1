<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REALMS</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0c0e12; }
      #view { display: block; width: 100vw; height: 100vh; }
      #hud {
        position: fixed; top: 0; left: 0; right: 0;
        display: flex; gap: 18px; align-items: center;
        padding: 10px 16px;
        font: 13px/1.4 Georgia, 'Times New Roman', serif;
        color: #e9dcc3;
        background: linear-gradient(to bottom, rgba(12, 14, 18, 0.8), transparent);
        pointer-events: none;
      }
      #hud .title { font-size: 16px; letter-spacing: 4px; font-weight: bold; }
      #hud b { color: #c9a227; }
      #hud button {
        pointer-events: auto;
        margin-left: auto;
        background: rgba(233, 220, 195, 0.1);
        border: 1px solid rgba(233, 220, 195, 0.35);
        color: #e9dcc3; font: inherit;
        padding: 3px 12px; border-radius: 3px; cursor: pointer;
      }
      #hud button:hover { background: rgba(233, 220, 195, 0.22); }
      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 8px;
        color: #e9dcc3; font: 15px Georgia, serif; letter-spacing: 2px;
        background: #0c0e12;
      }
      #hud .res { margin-right: 14px; }
      #hud .res b { color: #e9dcc3; }
      #hud .res i { color: #9a8f76; font-style: normal; font-size: 11px; }
      #hud #hud-speed { margin-left: auto; display: flex; gap: 4px; }
      #hud #hud-speed button {
        pointer-events: auto;
        background: rgba(233, 220, 195, 0.1);
        border: 1px solid rgba(233, 220, 195, 0.35);
        color: #e9dcc3; font: 12px Georgia, serif;
        padding: 2px 10px; border-radius: 3px; cursor: pointer;
      }
      #hud #hud-speed button.active { background: rgba(201, 162, 39, 0.35); border-color: #c9a227; }
      #chronicle {
        position: fixed; left: 12px; bottom: 12px;
        width: 360px; max-height: 38vh; overflow-y: auto;
        padding: 10px 12px;
        font: 12.5px/1.5 Georgia, 'Times New Roman', serif;
        color: #e9dcc3;
        background: rgba(18, 16, 12, 0.82);
        border: 1px solid rgba(233, 220, 195, 0.25);
        border-radius: 4px;
      }
      #chronicle .entry { margin-bottom: 6px; opacity: 0.92; }
      #chronicle .tone-good { color: #d8c88f; }
      #chronicle .tone-grim { color: #c98a7a; }
      #armypanel {
        position: fixed; right: 274px; top: 52px;
        width: 250px; max-height: 80vh; overflow-y: auto;
        padding: 12px;
        font: 12.5px/1.5 Georgia, 'Times New Roman', serif;
        color: #e9dcc3;
        background: rgba(18, 16, 12, 0.85);
        border: 1px solid rgba(233, 220, 195, 0.25);
        border-radius: 4px;
      }
      #armypanel .bm-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      #armypanel select {
        flex: 1; background: rgba(233, 220, 195, 0.08); color: #e9dcc3;
        border: 1px solid rgba(233, 220, 195, 0.3); font: inherit; padding: 3px;
      }
      #armypanel .bm-section {
        margin: 12px 0 6px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        color: #9a8f76; border-bottom: 1px solid rgba(233, 220, 195, 0.15);
      }
      #armypanel .bm-build {
        display: inline-flex; flex-direction: column; align-items: flex-start;
        width: calc(50% - 4px); margin: 2px 0; padding: 5px 8px;
        background: rgba(233, 220, 195, 0.08); border: 1px solid rgba(233, 220, 195, 0.3);
        color: #e9dcc3; font: inherit; border-radius: 3px; cursor: pointer;
      }
      #armypanel .bm-build:hover:not(:disabled) { background: rgba(233, 220, 195, 0.2); }
      #armypanel .bm-build:disabled { opacity: 0.4; cursor: default; }
      #armypanel .bm-build span { font-size: 10.5px; color: #9a8f76; }
      #armypanel .ap-queue { font-size: 11px; color: #d8c88f; margin-top: 4px; }
      #armypanel .ap-row { margin: 2px 0; }
      #armypanel .ap-form {
        width: 100%; margin-top: 8px;
        background: rgba(201, 162, 39, 0.2); border: 1px solid #c9a227;
        color: #e9dcc3; font: inherit; padding: 5px; border-radius: 3px; cursor: pointer;
      }
      #armypanel .ap-form:disabled { opacity: 0.4; cursor: default; }
      #armypanel .ap-army { display: flex; flex-direction: column; gap: 4px; margin: 6px 0; }
      #armypanel .ap-army button {
        background: rgba(233, 220, 195, 0.1); border: 1px solid rgba(233, 220, 195, 0.35);
        color: #e9dcc3; font: 11.5px Georgia, serif; padding: 2px 8px; border-radius: 3px; cursor: pointer;
      }
      #buildmenu {
        position: fixed; right: 12px; top: 52px;
        width: 250px; max-height: 80vh; overflow-y: auto;
        padding: 12px;
        font: 12.5px/1.5 Georgia, 'Times New Roman', serif;
        color: #e9dcc3;
        background: rgba(18, 16, 12, 0.85);
        border: 1px solid rgba(233, 220, 195, 0.25);
        border-radius: 4px;
      }
      #buildmenu .bm-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      #buildmenu select {
        flex: 1; background: rgba(233, 220, 195, 0.08); color: #e9dcc3;
        border: 1px solid rgba(233, 220, 195, 0.3); font: inherit; padding: 3px;
      }
      #buildmenu .bm-section {
        margin: 12px 0 6px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        color: #9a8f76; border-bottom: 1px solid rgba(233, 220, 195, 0.15);
      }
      #buildmenu .bm-build {
        display: inline-flex; flex-direction: column; align-items: flex-start;
        width: calc(50% - 4px); margin: 2px 0; padding: 5px 8px;
        background: rgba(233, 220, 195, 0.08); border: 1px solid rgba(233, 220, 195, 0.3);
        color: #e9dcc3; font: inherit; border-radius: 3px; cursor: pointer;
      }
      #buildmenu .bm-build:hover:not(:disabled) { background: rgba(233, 220, 195, 0.2); }
      #buildmenu .bm-build:disabled { opacity: 0.4; cursor: default; }
      #buildmenu .bm-build span { font-size: 10.5px; color: #9a8f76; }
      #buildmenu .bm-qrow { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
      #buildmenu .bm-qrow .bar {
        flex: 1; height: 6px; background: rgba(233, 220, 195, 0.12); border-radius: 3px; overflow: hidden;
      }
      #buildmenu .bm-qrow .bar div { height: 100%; background: #c9a227; }
      #buildmenu .bm-slider { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
      #buildmenu .bm-slider label { width: 66px; }
      #buildmenu .bm-slider input { flex: 1; accent-color: #c9a227; }
      #buildmenu .bm-slider .cap { font-size: 10.5px; color: #9a8f76; min-width: 76px; text-align: right; }
      #toasts {
        position: fixed; top: 52px; left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: column; gap: 6px; align-items: center;
        pointer-events: none;
      }
      #toasts .toast {
        padding: 6px 14px; border-radius: 3px;
        font: 13px Georgia, serif; color: #e9dcc3;
        background: rgba(18, 16, 12, 0.9); border: 1px solid rgba(233, 220, 195, 0.3);
      }
      #toasts .toast.bad { border-color: #c98a7a; color: #e9b3a5; }
      #toasts .toast.good { border-color: #c9a227; color: #d8c88f; }
      #techmenu {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: min(940px, 92vw); max-height: 82vh; overflow-y: auto;
        padding: 14px 16px;
        font: 12.5px/1.5 Georgia, 'Times New Roman', serif;
        color: #e9dcc3;
        background: rgba(18, 16, 12, 0.94);
        border: 1px solid rgba(201, 162, 39, 0.5);
        border-radius: 5px; z-index: 10;
      }
      #techmenu .tm-head { display: flex; align-items: center; gap: 16px; }
      #techmenu .tm-age { font-size: 16px; letter-spacing: 2px; color: #c9a227; }
      #techmenu #tm-research { color: #9a8f76; }
      #techmenu #tm-close {
        margin-left: auto; background: none; border: none; color: #e9dcc3;
        font: 14px Georgia, serif; cursor: pointer;
      }
      #techmenu .tm-advance {
        display: flex; align-items: center; gap: 12px; margin: 10px 0 12px;
        padding: 8px 10px; background: rgba(201, 162, 39, 0.08);
        border: 1px solid rgba(201, 162, 39, 0.35); border-radius: 4px;
      }
      #techmenu .tm-advance button {
        margin-left: auto; background: rgba(201, 162, 39, 0.25);
        border: 1px solid #c9a227; color: #e9dcc3; font: inherit;
        padding: 4px 16px; border-radius: 3px; cursor: pointer;
      }
      #techmenu .tm-advance button:disabled { opacity: 0.4; cursor: default; }
      #techmenu .tm-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
      #techmenu .tm-colhead {
        font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        color: #9a8f76; margin-bottom: 6px; border-bottom: 1px solid rgba(233, 220, 195, 0.15);
      }
      #techmenu .tm-card {
        margin-bottom: 8px; padding: 6px 8px;
        background: rgba(233, 220, 195, 0.05);
        border: 1px solid rgba(233, 220, 195, 0.2); border-radius: 3px;
      }
      #techmenu .tm-card.done { border-color: rgba(201, 162, 39, 0.6); }
      #techmenu .tm-card.active { border-color: #c9a227; }
      #techmenu .tm-card.locked { opacity: 0.55; }
      #techmenu .tm-card button {
        width: 100%; text-align: left; background: none; border: none;
        color: #e9dcc3; font: inherit; cursor: pointer; padding: 0;
        display: flex; justify-content: space-between; gap: 6px;
      }
      #techmenu .tm-card button:disabled { cursor: default; }
      #techmenu .tm-card button:hover:not(:disabled) b { color: #c9a227; }
      #techmenu .tm-card .cost { color: #9a8f76; font-size: 11px; white-space: nowrap; }
      #techmenu .tm-card .fx { color: #d8c88f; font-size: 11px; }
      #techmenu .tm-card .sub { color: #9a8f76; font-size: 10.5px; }
      #techmenu .tm-card .bar {
        height: 3px; background: rgba(233, 220, 195, 0.1); border-radius: 2px;
        overflow: hidden; margin-top: 3px;
      }
      #techmenu .tm-card .bar div { height: 100%; width: 0; background: #c9a227; }
      #culturepicker {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(12, 14, 18, 0.55); z-index: 20;
      }
      #culturepicker .cp-box {
        padding: 26px 30px; text-align: center;
        background: rgba(18, 16, 12, 0.95);
        border: 1px solid rgba(201, 162, 39, 0.5); border-radius: 6px;
        font: 13px/1.5 Georgia, 'Times New Roman', serif; color: #e9dcc3;
      }
      #culturepicker .cp-title { font-size: 19px; letter-spacing: 4px; margin-bottom: 18px; }
      #culturepicker .cp-cards { display: flex; gap: 14px; }
      #culturepicker .cp-card {
        display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
        width: 200px; padding: 14px 16px; text-align: left;
        background: rgba(233, 220, 195, 0.06); border: 1px solid;
        color: #e9dcc3; font: inherit; border-radius: 5px; cursor: pointer;
      }
      #culturepicker .cp-card:hover { background: rgba(233, 220, 195, 0.16); }
      #culturepicker .cp-card b { font-size: 16px; letter-spacing: 2px; }
      #culturepicker .cp-card span { color: #d8c88f; font-size: 12px; }
      #culturepicker .cp-card i { color: #9a8f76; font-size: 11px; font-style: normal; }
      #culturepicker .cp-continue { border-color: #c9a227; background: rgba(201, 162, 39, 0.15); }
      #culturepicker .cp-continue b { color: #c9a227; }
      #culturepicker .cp-help {
        margin-top: 16px; font-size: 11.5px; color: #9a8f76; line-height: 1.6; max-width: 640px;
      }
      #endscreen {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(12, 14, 18, 0.6); z-index: 30;
      }
      #endscreen .es-box {
        padding: 34px 46px; text-align: center;
        background: rgba(18, 16, 12, 0.96); border-radius: 6px;
        font: 13px/1.6 Georgia, 'Times New Roman', serif; color: #e9dcc3;
      }
      #endscreen .es-win { border: 2px solid #c9a227; }
      #endscreen .es-loss { border: 2px solid #c94a3a; }
      #endscreen .es-title { font-size: 30px; letter-spacing: 10px; margin-bottom: 10px; }
      #endscreen .es-win .es-title { color: #c9a227; }
      #endscreen .es-loss .es-title { color: #c94a3a; }
      #endscreen .es-sub { color: #d8c88f; max-width: 420px; }
      #endscreen .es-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
      #endscreen button {
        background: rgba(233, 220, 195, 0.1); border: 1px solid rgba(233, 220, 195, 0.35);
        color: #e9dcc3; font: inherit; padding: 6px 18px; border-radius: 3px; cursor: pointer;
      }
      #endscreen button:hover { background: rgba(233, 220, 195, 0.22); }
      #hud .objectives {
        font-size: 11px; color: #9a8f76; letter-spacing: 0.5px;
      }
      #hud .objectives b { color: #d8c88f; }
      #selbox {
        position: fixed; display: none; pointer-events: none; z-index: 5;
        border: 1px solid #c9a227; background: rgba(201, 162, 39, 0.12);
      }
      #selchip {
        position: fixed; display: none; bottom: 14px; left: 50%; transform: translateX(-50%);
        padding: 6px 16px; border-radius: 4px; pointer-events: none;
        font: 12.5px Georgia, 'Times New Roman', serif; color: #e9dcc3;
        background: rgba(18, 16, 12, 0.88); border: 1px solid rgba(201, 162, 39, 0.5);
      }
    </style>
  </head>
  <body>
    <canvas id="view"></canvas>
    <div id="hud"></div>
    <div id="chronicle"></div>
    <div id="buildmenu"></div>
    <div id="armypanel"></div>
    <div id="techmenu"></div>
    <div id="toasts"></div>
    <div id="selbox"></div>
    <div id="selchip"></div>
    <div id="culturepicker"></div>
    <div id="endscreen"></div>
    <div id="loading">
      <div style="letter-spacing:6px">R E A L M S</div>
      <div style="opacity:0.6;font-size:12px">forging the world…</div>
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
